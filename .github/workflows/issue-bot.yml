name: ArchivistPro Otomatik Cevap Botu

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  respond:
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Gemini Botunu Çalıştır
        uses: google-gemini/gemini-github-action@main
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: gemini-2.5-flash
          prompt: |
            Sen "ArchivistPro" adlı açık kaynaklı GitHub projesinin resmi yardım botusun.
            Bu proje; Tauri, Rust, React ve SQLite kullanan, mimari formatları (DWG, MAX, SKP vb.) yapay zeka ile çevrimdışı indeksleyen bir masaüstü arşiv yöneticisidir.
            
            Kural 1: Bu proje şu an "Stabil / Mevcut Haliyle Kararlı" moddadır. Acil ve kritik bir hata (crash) olmadığı sürece yeni özellik eklenmeyecektir.
            Kural 2: Gelen mesaj hangi dildeyse (Türkçe veya İngilizce) o dilde kibar, profesyonel ve net bir cevap ver.
            Kural 3: Kullanıcıya teşekkür et, sorusunu/önerisini anladığını belirt. Eğer bir hata bildiriyorsa "Geliştiricimiz en kısa sürede inceleyecektir" de. Eğer yeni özellik istiyorsa projenin dondurulduğunu kibarca açıkla.
            
            Gelen Mesaj: ${{ github.event.issue.body || github.event.comment.body }}
