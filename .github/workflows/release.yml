name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare offline assets (WebView2, ODA, Ollama, AI models)
        shell: pwsh
        run: |
          # Tüm offline varlıkları tek script ile indir
          .\scripts\prepare-offline-assets.ps1

      - name: Build Tauri app (offline MSI + NSIS)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            $env:TAURI_SIGNING_PRIVATE_KEY = ($env:TAURI_SIGNING_PRIVATE_KEY -replace '\s', '')
          }
          # WebView2 offline installer yolunu Tauri'ye bildir
          $env:TAURI_WEBVIEW2_INSTALLER_PATH = "$PWD\src-tauri\MicrosoftEdgeWebView2RuntimeInstallerX64.exe"
          npm run tauri build

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"
          $baseUrl = "https://github.com/$repo/releases/download/$tag"

          $msiFile    = Get-ChildItem "src-tauri/target/release/bundle/msi/" |
                        Where-Object { $_.Name -match "\.msi$" } |
                        Select-Object -First 1
          $msiSigFile = Get-ChildItem "src-tauri/target/release/bundle/msi/" |
                        Where-Object { $_.Name -match "\.msi\.sig$" } |
                        Select-Object -First 1

          if (-not $msiFile) { Write-Error "MSI dosyası bulunamadı!"; exit 1 }

          # Signing key yoksa sig dosyası olmaz — latest.json'da signature boş bırakılır
          $msiSig = ""
          if ($msiSigFile) {
            $msiSig = (Get-Content $msiSigFile.FullName -Raw).Trim()
            Write-Host "MSI imzası bulundu."
          } else {
            Write-Warning "MSI imzası yok — TAURI_SIGNING_PRIVATE_KEY ayarlanmamış. İmzasız release oluşturuluyor."
          }

          $json = [ordered]@{
            version  = $version
            notes    = "ArchivistPro $tag"
            pub_date = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $msiSig
                url       = "$baseUrl/$($msiFile.Name)"
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "latest.json oluşturuldu:"
          Get-Content "latest.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          name: 'ArchivistPro ${{ github.ref_name }}'
          body: |
            ## ArchivistPro ${{ github.ref_name }}

            ### Kurulum
            - **Windows (önerilen):** `ArchivistPro_*_x64_en-US.msi` dosyasını indirip çalıştırın
            - **Windows (alternatif):** `ArchivistPro_*_x64-setup.exe` dosyasını indirip çalıştırın
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
